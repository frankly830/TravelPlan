<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FamTrip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f4ef;--surface:#fff;--surface2:#f0ede8;--border:#e0dbd2;--text:#1a1714;--muted:#7a7570;--accent:#185FA5;--green:#0F6E56;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-size:17px;font-weight:700}
.sb-logo p{font-size:12px;color:var(--muted);margin-top:2px}
.sb-nav{padding:10px 8px;flex:1}
.nb{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);border:none;background:none;width:100%;text-align:left;cursor:pointer}
.nb:hover{background:var(--surface2);color:var(--text)}
.nb.on{background:#185FA511;color:var(--accent)}
.sb-budget{padding:14px;border-top:1px solid var(--border)}
.sb-budget .lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.bbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:5px}
.bfill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
.bnums{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#trip-title{font-size:19px;font-weight:700;border:none;background:none;color:var(--text);outline:none;flex:1;min-width:100px}
#trip-title:focus{background:var(--surface2);border-radius:6px;padding:2px 8px}
.lang-sw{display:flex;gap:3px;background:var(--surface2);border-radius:7px;padding:3px}
.lb{padding:3px 11px;font-size:12px;font-weight:600;border:none;border-radius:5px;background:none;color:var(--muted);cursor:pointer}
.lb.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tbtn{padding:7px 15px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.tbtn:hover{background:var(--surface2)}
.tbtn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
#content{flex:1;padding:22px 24px;overflow-y:auto;padding-bottom:80px}
.sec{display:none}.sec.on{display:block}

/* ADD DAY PANEL */
#add-day-panel{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:16px;margin-bottom:16px}
#add-day-panel h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--accent)}
#add-day-panel .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
#add-day-panel input{flex:1;min-width:160px;padding:9px 12px;font-size:14px;border:1.5px solid var(--accent);border-radius:8px;outline:none;color:var(--text)}
#add-day-panel .sugs{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
#add-day-panel .sug{padding:4px 11px;font-size:12px;border:1px solid var(--border);border-radius:14px;background:var(--surface2);color:var(--muted);cursor:pointer}
#add-day-panel .sug:hover{border-color:var(--accent);color:var(--accent)}
.abtn{padding:8px 18px;font-size:13px;font-weight:600;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer}
.cbtn{padding:8px 13px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);cursor:pointer}

/* DAY CARD */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.day-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
.day-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:#185FA511;color:var(--accent);border:none;cursor:text;outline:none}
.day-lbl{font-size:15px;font-weight:600;border:none;background:none;outline:none;color:var(--text);cursor:text;flex:1;margin-left:8px}
.day-lbl:focus,.day-badge:focus{background:var(--surface);border-radius:4px;padding:2px 6px}
.delbtn{background:none;border:none;font-size:16px;color:var(--muted);cursor:pointer;padding:3px 6px;border-radius:6px}
.delbtn:hover{background:var(--border)}

/* TIMELINE */
.tl{padding:0 16px}
.tli{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.tli:last-child{border-bottom:none}
.tl-t{font-size:12px;color:var(--muted);min-width:42px;font-weight:500;padding-top:2px}
.tl-ic{font-size:19px;min-width:24px;text-align:center}
.tl-b{flex:1}
.tl-n{font-size:14px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tl-m{font-size:12px;color:var(--muted)}
.tbadge{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500}
.tl-c{font-size:14px;font-weight:600;color:var(--green);text-align:right;min-width:55px}
.rmb{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:1px 5px;border-radius:4px;display:block;margin-top:2px}
.rmb:hover{background:var(--border)}
.editable{border:none;background:none;outline:none;cursor:text;color:inherit;font:inherit;width:auto}
.editable:focus{background:var(--surface2);border-radius:3px;padding:0 3px}

/* ADD ITEM FORM */
.add-row{padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border)}
.atbtn{padding:5px 11px;font-size:12px;border:1px solid var(--border);border-radius:16px;background:none;color:var(--muted);cursor:pointer;font-weight:500}
.atbtn:hover{border-color:var(--accent);color:var(--accent)}
.item-form{background:var(--surface2);border-radius:10px;padding:14px;margin:0 16px 12px;border:1px solid var(--border)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.fg.t3{grid-template-columns:1fr 1fr 1fr}
.fl label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.fl input,.fl select{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);outline:none}
.fl input:focus,.fl select:focus{border-color:var(--accent)}
.fa{display:flex;gap:7px}

/* COSTS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px}
.mc .ml{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.mc .mv{font-size:22px;font-weight:700}
.mv.g{color:var(--green)}.mv.r{color:#A32D2D}
.ctbl{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.cth{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:9px 16px;background:var(--surface2);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border)}
.cr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.cr:last-child{border-bottom:none;background:var(--surface2);font-weight:700}
.cdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.bchart{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.bchart h3{font-size:14px;font-weight:600;margin-bottom:12px}
.br{margin-bottom:10px}
.brl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.brt{height:9px;background:var(--border);border-radius:4px;overflow:hidden}
.brf{height:100%;border-radius:4px;transition:width .3s}

/* CHECKLIST */
.cp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:18px}
.cc{width:60px;height:60px;flex-shrink:0}
.cc svg{transform:rotate(-90deg)}
.ci h2{font-size:19px;font-weight:700}
.ci p{font-size:13px;color:var(--muted);margin-top:2px}
.cg{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.cgh{padding:10px 15px;background:var(--surface2);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
.cit{display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid var(--border)}
.cit:last-child{border-bottom:none}
.cit:hover{background:var(--surface2)}
.cit input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}
.cit label{flex:1;font-size:14px;cursor:pointer}
.cit.dn label{text-decoration:line-through;color:var(--muted)}
.cit .xb{background:none;border:none;color:var(--border);font-size:13px;cursor:pointer;padding:2px 5px;border-radius:4px}
.cit:hover .xb{color:var(--muted)}
.acr{display:flex;gap:7px;padding:11px 15px;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.acr input{flex:1;min-width:120px;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);outline:none}
.acr select{padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text)}
.acr button{padding:7px 13px;font-size:13px;font-weight:600;border:none;border-radius:7px;background:var(--accent);color:#fff;cursor:pointer}

@media(max-width:640px){
  #sidebar{display:none}
  #content{padding:14px;padding-bottom:80px}
  .fg,.fg.t3{grid-template-columns:1fr}
  #mobile-nav{display:flex!important}
}
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100}
.mn{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10px;font-weight:500;color:var(--muted);padding:7px 0;border:none;background:none;cursor:pointer}
.mn.on{color:var(--accent)}
.mn span:first-child{font-size:20px}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sb-logo">
      <h1>🧳 FamTrip</h1>
      <p id="sb-name">Beijing Family Adventure</p>
    </div>
    <nav class="sb-nav">
      <button class="nb on" data-tab="itinerary"><span>🗺️</span><span data-t="nav_itin">Itinerary</span></button>
      <button class="nb" data-tab="costs"><span>💰</span><span data-t="nav_costs">Costs</span></button>
      <button class="nb" data-tab="checklist"><span>✅</span><span data-t="nav_check">Checklist</span></button>
    </nav>
    <div class="sb-budget">
      <div class="lbl" data-t="lbl_budget">Budget</div>
      <div class="bbar"><div class="bfill" id="sb-fill"></div></div>
      <div class="bnums"><span id="sb-spent"></span><span id="sb-total"></span></div>
    </div>
  </aside>

  <div id="main">
    <div id="topbar">
      <input id="trip-title" value="Beijing Family Adventure"/>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="lang-sw">
          <button class="lb on" id="lb-en" onclick="setLang('en')">EN</button>
          <button class="lb" id="lb-zh" onclick="setLang('zh')">中文</button>
        </div>
        <button class="tbtn pri" id="btn-add-day">+ Add Day</button>
      </div>
    </div>

    <div id="content">
      <div class="sec on" id="sec-itinerary">
        <div id="add-day-panel" style="display:none">
          <h3>📅 <span data-t="new_day">New Day</span></h3>
          <div class="row">
            <input id="ndl" placeholder="e.g. Hutong Walk &amp; Night Market"/>
            <button class="abtn" id="btn-save-day">Add</button>
            <button class="cbtn" id="btn-cancel-day">Cancel</button>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px" data-t="suggestions">Suggestions:</div>
          <div class="sugs" id="day-sugs"></div>
        </div>
        <div id="days-container"></div>
      </div>

      <div class="sec" id="sec-costs">
        <div class="metrics">
          <div class="mc"><div class="ml" data-t="m_spent">Total Spent</div><div class="mv" id="m-spent">¥0</div></div>
          <div class="mc"><div class="ml" data-t="m_budget">Budget</div><div class="mv"><input id="budget-inp" type="number" value="50000" style="width:100px;font-size:20px;font-weight:700;border:none;background:none;outline:none;color:inherit"/></div></div>
          <div class="mc"><div class="ml" data-t="m_remain">Remaining</div><div class="mv" id="m-remain">¥0</div></div>
          <div class="mc"><div class="ml" data-t="m_pct">% Used</div><div class="mv" id="m-pct">0%</div></div>
        </div>
        <div class="ctbl">
          <div class="cth"><span data-t="th_cat">Category</span><span data-t="th_items">Items</span><span data-t="th_amt">Amount</span><span data-t="th_share">Share</span></div>
          <div id="cat-rows"></div>
        </div>
        <div class="bchart"><h3 data-t="cost_day">Cost by Day</h3><div id="day-bars"></div></div>
      </div>

      <div class="sec" id="sec-checklist">
        <div class="cp">
          <div class="cc">
            <svg width="60" height="60" viewBox="0 0 60 60">
              <circle cx="30" cy="30" r="24" fill="none" stroke="#e0dbd2" stroke-width="6"/>
              <circle cx="30" cy="30" r="24" fill="none" stroke="#0F6E56" stroke-width="6"
                stroke-dasharray="150.8" id="prog-arc" stroke-dashoffset="150.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="ci">
            <h2 id="chk-frac">0 / 0</h2>
            <p id="chk-pct">0% <span data-t="complete">complete</span></p>
            <p style="font-size:12px;color:var(--muted);margin-top:3px" data-t="prep_list">Preparation checklist</p>
          </div>
        </div>
        <div id="chk-groups"></div>
        <div class="cg">
          <div class="acr">
            <select id="chk-cat-sel"></select>
            <input id="chk-new-txt" placeholder="Add item…"/>
            <button id="btn-add-chk">Add</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<nav id="mobile-nav">
  <button class="mn on" data-tab="itinerary"><span>🗺️</span><span data-t="nav_itin">Itinerary</span></button>
  <button class="mn" data-tab="costs"><span>💰</span><span data-t="nav_costs">Costs</span></button>
  <button class="mn" data-tab="checklist"><span>✅</span><span data-t="nav_check">Checklist</span></button>
</nav>

<script>
// ── TRANSLATIONS ──
const TR={
  en:{nav_itin:"Itinerary",nav_costs:"Costs",nav_check:"Checklist",lbl_budget:"Budget",
    new_day:"New Day",suggestions:"Suggestions:",m_spent:"Total Spent",m_budget:"Budget",
    m_remain:"Remaining",m_pct:"% Used",th_cat:"Category",th_items:"Items",th_amt:"Amount",
    th_share:"Share",cost_day:"Cost by Day",complete:"complete",prep_list:"Preparation checklist",
    btn_save:"Save",btn_cancel:"Cancel",btn_remove:"remove",total:"Total",
    cats:{transport:"Transport",attraction:"Attraction",food:"Food",accommodation:"Accommodation",misc:"Misc"},
    veh:{flight:"Flight",train:"Train",car:"Car",bus:"Bus",ferry:"Ferry",walk:"Walk"},
    chk_cats:["Documents","Health","Kids","Packing","Money","Other"],
    chk_labels:{Documents:"Documents",Health:"Health",Kids:"Kids",Packing:"Packing",Money:"Money",Other:"Other"},
    day_sugs:["Hutong Walk & Night Market","798 Art District & Sanlitun","Olympic Park & Bird's Nest","Lama Temple & Drum Tower","Beijing Zoo & Happy Valley"],
    del_day:"Remove this day and all its items?",
    f:{name:"Name",time:"Time",dur:"Duration",cost:"Cost (¥)",veh:"Vehicle",from:"From",to:"To",notes:"Notes"},
    ph:{name:"e.g. Great Wall",dur:"e.g. 2h",notes:"Optional…",dep:"Departure",arr:"Arrival",day:"e.g. Hutong Walk & Night Market",chk:"Add checklist item…"}
  },
  zh:{nav_itin:"行程",nav_costs:"费用",nav_check:"清单",lbl_budget:"预算",
    new_day:"新增天",suggestions:"建议：",m_spent:"总花费",m_budget:"预算",
    m_remain:"剩余",m_pct:"已用%",th_cat:"类别",th_items:"项目",th_amt:"金额",
    th_share:"占比",cost_day:"每日费用",complete:"已完成",prep_list:"出行准备清单",
    btn_save:"保存",btn_cancel:"取消",btn_remove:"删除",total:"合计",
    cats:{transport:"交通",attraction:"景点",food:"餐饮",accommodation:"住宿",misc:"其他"},
    veh:{flight:"飞机",train:"火车",car:"汽车",bus:"巴士",ferry:"轮船",walk:"步行"},
    chk_cats:["证件","健康","儿童","行李","金钱","其他"],
    chk_labels:{Documents:"证件",Health:"健康",Kids:"儿童",Packing:"行李",Money:"金钱",Other:"其他"},
    day_sugs:["胡同漫步 & 夜市","798艺术区 & 三里屯","奥林匹克公园 & 鸟巢","雍和宫 & 鼓楼","北京动物园 & 欢乐谷"],
    del_day:"确定删除这一天及其所有项目？",
    f:{name:"名称",time:"时间",dur:"时长",cost:"费用 (¥)",veh:"交通工具",from:"出发",to:"到达",notes:"备注"},
    ph:{name:"如：长城",dur:"如：2小时",notes:"备注…",dep:"出发地",arr:"目的地",day:"如：胡同漫步 & 夜市",chk:"添加清单项目…"}
  }
};
let lang='en';
function L(k){const p=k.split('.');let o=TR[lang];for(const s of p){o=o?.[s];}return o||k;}

// ── DATA ──
const COLORS={transport:"#185FA5",attraction:"#0F6E56",food:"#854F0B",accommodation:"#533AB7",misc:"#993556"};
const ICONS={flight:"✈️",train:"🚂",car:"🚗",bus:"🚌",ferry:"⛴️",walk:"🚶",transport:"🚀",attraction:"🏛️",food:"🍽️",accommodation:"🏨",misc:"📦"};
let budget=50000;
let days=[
  {id:1,date:"Day 1",label:"Arrival & Tiananmen",items:[
    {id:101,type:"transport",veh:"flight",name:"Flight to Beijing",from:"Home Airport",to:"Beijing PEK",time:"08:00",dur:"3h",cost:5000,notes:"Terminal 3"},
    {id:102,type:"accommodation",veh:"",name:"Check-in Hotel",from:"",to:"",time:"14:00",dur:"1h",cost:4000,notes:"Near Wangfujing"},
    {id:103,type:"attraction",veh:"",name:"Tiananmen Square",from:"",to:"",time:"16:00",dur:"2h",cost:0,notes:"Free entry"},
  ]},
  {id:2,date:"Day 2",label:"Forbidden City & Temple of Heaven",items:[
    {id:201,type:"attraction",veh:"",name:"Forbidden City",from:"",to:"",time:"09:00",dur:"3h",cost:400,notes:"Book tickets in advance"},
    {id:202,type:"food",veh:"",name:"Quanjude Peking Duck",from:"",to:"",time:"12:30",dur:"1h",cost:1200,notes:"Famous restaurant"},
    {id:203,type:"attraction",veh:"",name:"Temple of Heaven",from:"",to:"",time:"14:30",dur:"2h",cost:200,notes:"Beautiful grounds"},
    {id:204,type:"transport",veh:"train",name:"Subway Line 2",from:"Qianmen",to:"Wangfujing",time:"17:00",dur:"20m",cost:20,notes:""},
  ]},
  {id:3,date:"Day 3",label:"Great Wall & Summer Palace",items:[
    {id:301,type:"transport",veh:"bus",name:"Bus to Great Wall",from:"Hotel",to:"Mutianyu",time:"07:30",dur:"1.5h",cost:500,notes:"Mutianyu section"},
    {id:302,type:"attraction",veh:"",name:"Great Wall of China",from:"",to:"",time:"09:30",dur:"3h",cost:400,notes:"Cable car for kids"},
    {id:303,type:"food",veh:"",name:"Local Restaurant",from:"",to:"",time:"13:30",dur:"1h",cost:800,notes:"Near Mutianyu"},
    {id:304,type:"attraction",veh:"",name:"Summer Palace",from:"",to:"",time:"15:30",dur:"2h",cost:300,notes:"Boat on Kunming Lake"},
  ]},
];
let checklist=[
  {id:1,cat:"Documents",en:"Passports (valid 6+ months)",zh:"护照（有效期6个月以上）",done:false},
  {id:2,cat:"Documents",en:"Travel insurance",zh:"旅行保险",done:false},
  {id:3,cat:"Documents",en:"Flight & hotel bookings",zh:"机票和酒店预订",done:false},
  {id:4,cat:"Health",en:"Prescription medications",zh:"处方药",done:false},
  {id:5,cat:"Health",en:"First aid kit",zh:"急救箱",done:false},
  {id:6,cat:"Kids",en:"Kids tablets & entertainment",zh:"儿童平板和娱乐",done:false},
  {id:7,cat:"Kids",en:"Snacks for journey",zh:"旅途零食",done:false},
  {id:8,cat:"Packing",en:"Sunscreen & hats",zh:"防晒霜和帽子",done:false},
  {id:9,cat:"Packing",en:"Comfortable walking shoes",zh:"舒适步行鞋",done:false},
  {id:10,cat:"Packing",en:"Chargers & power banks",zh:"充电器和移动电源",done:false},
  {id:11,cat:"Money",en:"Notify bank of travel",zh:"通知银行出行",done:false},
  {id:12,cat:"Money",en:"Local currency / travel card",zh:"当地货币/旅行卡",done:false},
];
let addItemDayId=null, addItemType=null;

// ── INIT ──
document.getElementById('trip-title').addEventListener('input',function(){document.getElementById('sb-name').textContent=this.value;});
document.getElementById('budget-inp').addEventListener('input',function(){budget=Number(this.value)||0;updateSidebar();});

// Nav
document.querySelectorAll('.nb,.mn').forEach(function(b){
  b.addEventListener('click',function(){switchTab(this.dataset.tab);});
});

function switchTab(tab){
  document.querySelectorAll('.nb,.mn').forEach(function(b){b.classList.toggle('on',b.dataset.tab===tab);});
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.getElementById('sec-'+tab).classList.add('on');
  if(tab==='costs')renderCosts();
  if(tab==='checklist')renderChecklist();
}

// Lang
function setLang(l){
  lang=l;
  document.getElementById('lb-en').classList.toggle('on',l==='en');
  document.getElementById('lb-zh').classList.toggle('on',l==='zh');
  document.querySelectorAll('[data-t]').forEach(function(el){
    const v=L(el.getAttribute('data-t'));
    if(v&&v!==el.getAttribute('data-t'))el.textContent=v;
  });
  populateCheckCats();
  renderDays();
  renderChecklist();
  if(document.getElementById('sec-costs').classList.contains('on'))renderCosts();
}

// ── ADD DAY ──
document.getElementById('btn-add-day').addEventListener('click',function(){
  const panel=document.getElementById('add-day-panel');
  panel.style.display='block';
  const inp=document.getElementById('ndl');
  inp.value='';
  inp.placeholder=L('ph.day');
  // suggestions
  const sugs=document.getElementById('day-sugs');
  sugs.innerHTML='';
  L('day_sugs').forEach(function(s){
    const btn=document.createElement('button');
    btn.className='sug';
    btn.textContent=s;
    btn.addEventListener('click',function(){inp.value=s;inp.focus();});
    sugs.appendChild(btn);
  });
  inp.focus();
});

document.getElementById('btn-save-day').addEventListener('click',function(){
  const inp=document.getElementById('ndl');
  const label=inp.value.trim();
  if(!label){inp.focus();return;}
  days.push({id:Date.now(),date:'Day '+(days.length+1),label:label,items:[]});
  document.getElementById('add-day-panel').style.display='none';
  inp.value='';
  renderDays();
});

document.getElementById('btn-cancel-day').addEventListener('click',function(){
  document.getElementById('add-day-panel').style.display='none';
  document.getElementById('ndl').value='';
});

document.getElementById('ndl').addEventListener('keydown',function(e){
  if(e.key==='Enter'){document.getElementById('btn-save-day').click();}
  if(e.key==='Escape'){document.getElementById('btn-cancel-day').click();}
});

// ── RENDER DAYS ──
function allItems(){return days.flatMap(function(d){return d.items;});}

function renderDays(){
  const c=document.getElementById('days-container');
  c.innerHTML='';
  days.forEach(function(day){
    const card=document.createElement('div');
    card.className='day-card';
    // header
    const head=document.createElement('div');
    head.className='day-head';
    const badge=document.createElement('input');
    badge.className='day-badge';badge.value=day.date;badge.title='Click to edit';
    badge.addEventListener('change',function(){day.date=this.value;});
    const lbl=document.createElement('input');
    lbl.className='day-lbl';lbl.value=day.label;lbl.title='Click to edit';
    lbl.addEventListener('change',function(){day.label=this.value;});
    const del=document.createElement('button');
    del.className='delbtn';del.textContent='🗑️';
    del.addEventListener('click',function(){
      if(confirm(L('del_day'))){days=days.filter(function(d){return d.id!==day.id;});renderDays();}
    });
    head.appendChild(badge);head.appendChild(lbl);head.appendChild(del);
    card.appendChild(head);
    // timeline
    const tl=document.createElement('div');tl.className='tl';
    const sorted=[...day.items].sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
    sorted.forEach(function(item){
      const row=document.createElement('div');row.className='tli';
      const ic=item.type==='transport'?(ICONS[item.veh]||'🚀'):ICONS[item.type]||'📌';
      const col=COLORS[item.type]||'#666';
      // time (editable)
      const te=document.createElement('input');te.className='tl-t editable';te.value=item.time||'—';te.style.width='44px';
      te.addEventListener('change',function(){item.time=this.value;updateSidebar();});
      // icon
      const ie=document.createElement('div');ie.className='tl-ic';ie.textContent=ic;
      // body
      const body=document.createElement('div');body.className='tl-b';
      const nrow=document.createElement('div');nrow.className='tl-n';
      const ne=document.createElement('input');ne.className='editable';ne.value=item.name;ne.style.fontWeight='600';ne.style.fontSize='14px';
      ne.addEventListener('change',function(){item.name=this.value;});
      const bdg=document.createElement('span');bdg.className='tbadge';
      bdg.style.background=col+'18';bdg.style.color=col;bdg.textContent=L('cats.'+item.type);
      nrow.appendChild(ne);nrow.appendChild(bdg);
      const meta=document.createElement('div');meta.className='tl-m';
      const dur=item.type==='transport'&&item.from?`⏱️ ${item.dur} · ${item.from}→${item.to}`:(`⏱️ `);
      const de=document.createElement('input');de.className='editable';de.value=item.dur;de.style.width='50px';
      de.addEventListener('change',function(){item.dur=this.value;});
      meta.innerHTML='⏱️ ';meta.appendChild(de);
      if(item.type==='transport'&&item.from){
        const fr=document.createElement('input');fr.className='editable';fr.value=item.from;fr.style.width='70px';
        fr.addEventListener('change',function(){item.from=this.value;});
        const to=document.createElement('input');to.className='editable';to.value=item.to;to.style.width='70px';
        to.addEventListener('change',function(){item.to=this.value;});
        meta.appendChild(document.createTextNode(' · '));meta.appendChild(fr);
        meta.appendChild(document.createTextNode(' → '));meta.appendChild(to);
      }
      if(item.notes){meta.appendChild(document.createTextNode(' · '));
        const no=document.createElement('input');no.className='editable';no.value=item.notes;no.style.width='100px';no.style.color='var(--muted)';
        no.addEventListener('change',function(){item.notes=this.value;});
        meta.appendChild(no);
      }
      body.appendChild(nrow);body.appendChild(meta);
      // cost
      const cright=document.createElement('div');cright.style.textAlign='right';
      const ce=document.createElement('input');ce.className='tl-c editable';ce.value=item.cost;ce.style.width='60px';ce.style.textAlign='right';
      ce.addEventListener('change',function(){item.cost=Number(this.value)||0;updateSidebar();});
      const rm=document.createElement('button');rm.className='rmb';rm.textContent=L('btn_remove');
      rm.addEventListener('click',function(){
        day.items=day.items.filter(function(i){return i.id!==item.id;});renderDays();
      });
      cright.appendChild(document.createTextNode('¥'));cright.appendChild(ce);cright.appendChild(rm);
      row.appendChild(te);row.appendChild(ie);row.appendChild(body);row.appendChild(cright);
      tl.appendChild(row);
    });
    card.appendChild(tl);
    // add item form
    if(addItemDayId===day.id){
      const form=buildItemForm(day.id);
      card.appendChild(form);
    }
    // add buttons
    const addrow=document.createElement('div');addrow.className='add-row';
    ['transport','attraction','food','accommodation','misc'].forEach(function(tp){
      const b=document.createElement('button');b.className='atbtn';
      b.textContent=ICONS[tp]+' + '+L('cats.'+tp);
      b.addEventListener('click',function(){addItemDayId=day.id;addItemType=tp;renderDays();
        setTimeout(function(){const f=document.getElementById('afi-name');if(f)f.focus();},50);
      });
      addrow.appendChild(b);
    });
    card.appendChild(addrow);
    c.appendChild(card);
  });
  updateSidebar();
}

function buildItemForm(dayId){
  const isT=addItemType==='transport';
  const wrap=document.createElement('div');wrap.className='item-form';
  const g=document.createElement('div');g.className='fg'+(isT?' t3':'');
  function field(id,lbl,type,ph,val,opts){
    const d=document.createElement('div');d.className='fl';
    const l=document.createElement('label');l.textContent=lbl;
    let inp;
    if(opts){
      inp=document.createElement('select');inp.id=id;
      opts.forEach(function(o){const op=document.createElement('option');op.value=o.v;op.textContent=o.t;inp.appendChild(op);});
    } else {
      inp=document.createElement('input');inp.id=id;inp.type=type||'text';inp.placeholder=ph||'';if(val!==undefined)inp.value=val;
    }
    d.appendChild(l);d.appendChild(inp);return d;
  }
  if(isT) g.style.gridColumn='1/-1';
  g.appendChild(field('afi-name',L('f.name'),'text',L('ph.name'),''));
  g.appendChild(field('afi-time',L('f.time'),'time','','09:00'));
  g.appendChild(field('afi-dur',L('f.dur'),'text',L('ph.dur'),''));
  g.appendChild(field('afi-cost',L('f.cost'),'number','','0'));
  if(isT){
    g.appendChild(field('afi-veh',L('f.veh'),null,null,null,
      Object.keys(ICONS).filter(function(k){return['flight','train','car','bus','ferry','walk'].includes(k);})
        .map(function(k){return{v:k,t:ICONS[k]+' '+L('veh.'+k)};})));
    g.appendChild(field('afi-from',L('f.from'),'text',L('ph.dep'),''));
    g.appendChild(field('afi-to',L('f.to'),'text',L('ph.arr'),''));
  }
  const nf=field('afi-notes',L('f.notes'),'text',L('ph.notes'),'');
  nf.style.gridColumn='1/-1';g.appendChild(nf);
  wrap.appendChild(g);
  const fa=document.createElement('div');fa.className='fa';
  const sv=document.createElement('button');sv.className='abtn';sv.textContent=L('btn_save');
  sv.addEventListener('click',function(){
    const name=(document.getElementById('afi-name').value||'').trim();
    if(!name)return;
    const item={id:Date.now(),type:addItemType,
      name:name,
      time:document.getElementById('afi-time').value||'',
      dur:document.getElementById('afi-dur').value||'',
      cost:Number(document.getElementById('afi-cost').value)||0,
      notes:document.getElementById('afi-notes').value||'',
      veh:isT?(document.getElementById('afi-veh').value||''):'',
      from:isT?(document.getElementById('afi-from').value||''):'',
      to:isT?(document.getElementById('afi-to').value||''):'',
    };
    const d=days.find(function(d){return d.id===dayId;});
    if(d)d.items.push(item);
    addItemDayId=null;addItemType=null;renderDays();
  });
  const cn=document.createElement('button');cn.className='cbtn';cn.textContent=L('btn_cancel');
  cn.addEventListener('click',function(){addItemDayId=null;addItemType=null;renderDays();});
  fa.appendChild(sv);fa.appendChild(cn);wrap.appendChild(fa);
  return wrap;
}

// ── SIDEBAR ──
function updateSidebar(){
  const spent=allItems().reduce(function(s,i){return s+(Number(i.cost)||0);},0);
  const pct=budget>0?Math.min((spent/budget)*100,100):0;
  document.getElementById('sb-fill').style.width=pct+'%';
  document.getElementById('sb-fill').style.background=pct>90?'#A32D2D':'#0F6E56';
  document.getElementById('sb-spent').textContent='¥'+spent.toLocaleString();
  document.getElementById('sb-total').textContent='/ ¥'+budget.toLocaleString();
  document.getElementById('m-spent').textContent='¥'+spent.toLocaleString();
  const rem=budget-spent;
  const re=document.getElementById('m-remain');re.textContent='¥'+rem.toLocaleString();re.className='mv '+(rem>=0?'g':'r');
  document.getElementById('m-pct').textContent=(budget>0?Math.round((spent/budget)*100):0)+'%';
}

// ── COSTS ──
function renderCosts(){
  const items=allItems();
  const total=items.reduce(function(s,i){return s+(Number(i.cost)||0);},0);
  const cats={transport:0,attraction:0,food:0,accommodation:0,misc:0};
  const cnt={transport:0,attraction:0,food:0,accommodation:0,misc:0};
  items.forEach(function(i){cats[i.type]=(cats[i.type]||0)+(Number(i.cost)||0);cnt[i.type]=(cnt[i.type]||0)+1;});
  const r=document.getElementById('cat-rows');r.innerHTML='';
  Object.keys(cats).forEach(function(cat){
    const amt=cats[cat];const pct=total>0?Math.round((amt/total)*100):0;
    const row=document.createElement('div');row.className='cr';
    row.innerHTML='<span><span class="cdot" style="background:'+COLORS[cat]+'"></span>'+ICONS[cat]+' '+L('cats.'+cat)+'</span><span style="color:var(--muted)">'+cnt[cat]+'</span><span>¥'+amt.toLocaleString()+'</span><span>'+pct+'%</span>';
    r.appendChild(row);
  });
  const tot=document.createElement('div');tot.className='cr';
  tot.innerHTML='<span>'+L('total')+'</span><span style="color:var(--muted)">'+items.length+'</span><span>¥'+total.toLocaleString()+'</span><span>100%</span>';
  r.appendChild(tot);
  const db=document.getElementById('day-bars');db.innerHTML='';
  days.forEach(function(d){
    const dt=d.items.reduce(function(s,i){return s+(Number(i.cost)||0);},0);
    const pct=total>0?Math.round((dt/total)*100):0;
    const br=document.createElement('div');br.className='br';
    br.innerHTML='<div class="brl"><span>'+d.date+' · '+d.label+'</span><span style="font-weight:600">¥'+dt.toLocaleString()+'</span></div><div class="brt"><div class="brf" style="width:'+pct+'%;background:#185FA5;border-radius:4px"></div></div>';
    db.appendChild(br);
  });
  updateSidebar();
}

// ── CHECKLIST ──
function populateCheckCats(){
  const sel=document.getElementById('chk-cat-sel');if(!sel)return;
  const cats=TR[lang].chk_cats;sel.innerHTML='';
  cats.forEach(function(c){const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
}

function renderChecklist(){
  const done=checklist.filter(function(c){return c.done;}).length;
  const total=checklist.length;
  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('chk-frac').textContent=done+' / '+total;
  document.getElementById('prog-arc').setAttribute('stroke-dashoffset',150.8-(150.8*(pct/100)));
  const grouped={};
  checklist.forEach(function(c){if(!grouped[c.cat])grouped[c.cat]=[];grouped[c.cat].push(c);});
  const gc=document.getElementById('chk-groups');gc.innerHTML='';
  const labels=TR[lang].chk_labels;
  Object.keys(grouped).forEach(function(cat){
    const g=document.createElement('div');g.className='cg';
    const h=document.createElement('div');h.className='cgh';h.textContent=labels[cat]||cat;g.appendChild(h);
    grouped[cat].forEach(function(item){
      const row=document.createElement('div');row.className='cit'+(item.done?' dn':'');
      const cb=document.createElement('input');cb.type='checkbox';cb.checked=item.done;
      cb.addEventListener('change',function(){item.done=this.checked;renderChecklist();});
      const lb=document.createElement('label');lb.textContent=lang==='zh'?(item.zh||item.en):(item.en||item.zh);
      const xb=document.createElement('button');xb.className='xb';xb.textContent='✕';
      xb.addEventListener('click',function(){checklist=checklist.filter(function(c){return c.id!==item.id;});renderChecklist();});
      row.appendChild(cb);row.appendChild(lb);row.appendChild(xb);g.appendChild(row);
    });
    gc.appendChild(g);
  });
}

document.getElementById('btn-add-chk').addEventListener('click',function(){
  const txt=document.getElementById('chk-new-txt').value.trim();
  if(!txt)return;
  const cat=document.getElementById('chk-cat-sel').value||'Other';
  const item={id:Date.now(),cat:cat,done:false};
  item[lang==='zh'?'zh':'en']=txt;
  item[lang==='zh'?'en':'zh']=txt;
  checklist.push(item);
  document.getElementById('chk-new-txt').value='';
  renderChecklist();
});
document.getElementById('chk-new-txt').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btn-add-chk').click();});

// ── START ──
populateCheckCats();
renderDays();
updateSidebar();
</script>
</body>
